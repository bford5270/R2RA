# Crosswalk v0.2 — DRAFT, NEEDS SME REVIEW
#
# Maps JTS Role 2 Readiness Assessment items to USMC HSS T&R wickets
# (NAVMC 3500.84B Ch 2) and to doctrinal METs (MCT).
#
# v0.2 changes from v0.1:
#   - Added Ch 5 (Med Common Skills), Ch 6 (L03A), Ch 7 (Clinical),
#     Ch 8 (NEC 8427), Ch 9 (NEC 8403) wickets throughout.
#   - Filled cra, cc, blood, fac, orsop, arsra sparse sections.
#   - Added notes for items that are credential/admin/policy (no T&R wicket
#     is correct; evidence lives elsewhere).
#
# Mapping confidence:
#   high   — strong 1:1 or near-1:1 doctrinal/training correspondence
#   medium — plausible relationship, SME should confirm
#   low    — thematic link only; included for context, not gating
#
# Each mapping is an SME touchpoint. Do not treat as authoritative until
# reviewed and status is flipped to 'approved'.

version: "0.2"
status: draft-needs-sme-review
source_frameworks:
  jts:   { id: jts_r2,  version: "2024.0" }
  hsstr: { id: hss_tr,  version: "3500.84B-ch2" }
  mets:  { id: mct_hss_seed, version: "0.1" }

mappings:

